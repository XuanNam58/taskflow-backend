spring:
  application:
    name: taskflow-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/taskflow
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    
logging:
  level:
    org.flywaydb: INFO